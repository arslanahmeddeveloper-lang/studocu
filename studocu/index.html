<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuDocu Downloader — Free PDF Downloads</title>
    <meta name="description" content="Download StuDocu documents as PDF for free. Paste your StuDocu URL and get an instant PDF download.">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f5f0;
            --bg-card: #ffffff;
            --text-heading: #2c2a25;
            --text-body: #5c5850;
            --text-muted: #9b9588;
            --border: #e8e4dc;
            --border-focus: #c4bfb4;
            --accent: #1a1a1a;
            --accent-hover: #333333;
            --green: #3a8a5c;
            --green-bg: #e8f5ee;
            --error: #c54b3c;
            --error-bg: #fdf0ee;
            --success: #3a8a5c;
            --radius: 10px;
            --transition: 0.25s ease;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            padding: 20px;
        }

        /* ===== CARD ===== */
        .studocu-container {
            width: 100%;
            max-width: 640px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 44px 48px 40px;
            position: relative;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .header h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-heading);
            margin: 0;
        }

        .header-subtitle {
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            margin-top: 6px;
        }

        /* ===== FORM ===== */
        .form-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
        }

        #studocu-url {
            width: 100%;
            padding: 15px 40px 15px 18px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-heading);
            font-size: 0.92rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        #studocu-url::placeholder { color: var(--text-muted); }

        #studocu-url:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
        }

        #studocu-url:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--border);
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, background 0.2s ease;
        }

        #clear-btn.visible { opacity: 1; pointer-events: auto; }
        #clear-btn:hover { background: var(--border-focus); color: var(--text-heading); }

        #download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px 28px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        #download-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        #download-btn:active { transform: scale(0.98); }
        #download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

        .btn-loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        #download-btn.loading .btn-text,
        #download-btn.loading .btn-icon { display: none; }
        #download-btn.loading .btn-loader { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== PROGRESS ===== */
        .progress-section {
            margin: 0 0 24px;
            animation: fadeIn 0.3s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 100px;
            transition: width 0.5s ease;
        }

        #status-text {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.84rem;
            text-align: center;
            font-weight: 500;
        }

        #status-text.success { color: var(--success); }

        /* ===== ERROR ===== */
        .status-indicator.error {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(197, 75, 60, 0.12);
            padding: 12px 16px;
            border-radius: 8px;
            margin: 0 0 24px;
            font-size: 0.84rem;
            font-weight: 500;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeIn 0.25s ease both;
            line-height: 1.4;
        }

        .error-icon {
            font-weight: 700;
            font-size: 0.68rem;
            width: 20px;
            height: 20px;
            min-width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(197, 75, 60, 0.1);
            border-radius: 50%;
        }

        /* ===== TRUST BADGES ===== */
        .trust-badges {
            display: flex;
            flex-wrap: nowrap;
            justify-content: space-between;
            align-items: center;
            gap: 0;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-body);
            white-space: nowrap;
        }

        .badge-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--green-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .badge-check svg { width: 12px; height: 12px; color: var(--green); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .studocu-container { padding: 36px 24px 32px; }
            .form-container { flex-direction: column; }
            #download-btn { justify-content: center; }
            .trust-badges { flex-wrap: wrap; justify-content: center; gap: 8px 16px; }
            .badge { font-size: 12px; }
        }
    </style>
</head>

<body>
    <div class="studocu-container" id="studocu-container">
        <div class="header">
            <h1>Paste Your StuDocu Link Below</h1>
        </div>
        <p class="header-subtitle">Converts any StuDocu document to a downloadable PDF</p>

        <div class="main-content">
            <div class="form-container">
                <div class="input-wrapper">
                    <input type="text" id="studocu-url"
                        placeholder="https://www.studocu.com/en-us/document/..."
                        autocomplete="off" spellcheck="false">
                    <button id="clear-btn" title="Clear" tabindex="-1">&times;</button>
                </div>
                <button id="download-btn">
                    <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span class="btn-text">Download PDF</span>
                    <span class="btn-loader"></span>
                </button>
            </div>

            <div class="progress-section" id="progress-section" style="display: none;">
                <div class="progress-track">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <p id="status-text">Initializing...</p>
            </div>

            <div class="status-indicator error" id="error-indicator" style="display: none;">
                <span class="error-icon">✕</span>
                <span id="error-text"></span>
            </div>

            <div class="trust-badges">
                <div class="badge">
                    <span class="badge-check">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>
                    No registration
                </div>
                <div class="badge">
                    <span class="badge-check">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>
                    Unlimited downloads
                </div>
                <div class="badge">
                    <span class="badge-check">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </span>
                    All devices supported
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const downloadBtn = document.getElementById('download-btn');
            const urlInput    = document.getElementById('studocu-url');
            const clearBtn    = document.getElementById('clear-btn');
            const progressSection = document.getElementById('progress-section');
            const progressBar     = document.getElementById('progress-bar');
            const statusText      = document.getElementById('status-text');
            const errorIndicator  = document.getElementById('error-indicator');
            const errorText       = document.getElementById('error-text');

            /**
             * API_BASE_URL auto-detection:
             * - When served by the Node.js server on port 7860 → use same-origin (empty string)
             * - When opened as a local file or different port → point to localhost:7860
             */
            const API_BASE_URL = (
                window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1'
            ) ? '' : 'http://localhost:7860';

            // ─── Clear button ───────────────────────────────────────────────
            urlInput.addEventListener('input', () => {
                clearBtn.classList.toggle('visible', urlInput.value.length > 0);
            });

            clearBtn.addEventListener('click', () => {
                urlInput.value = '';
                clearBtn.classList.remove('visible');
                hideError();
                urlInput.focus();
            });

            // ─── State helpers ───────────────────────────────────────────────
            let pollInterval = null;

            const resetUI = () => {
                setLoading(false);
                progressSection.style.display = 'none';
                hideError();
                progressBar.style.width = '0%';
                statusText.textContent = '';
                statusText.classList.remove('success');
                urlInput.disabled = false;
            };

            function setLoading(isLoading) {
                downloadBtn.disabled = isLoading;
                urlInput.disabled    = isLoading;
                clearBtn.disabled    = isLoading;
                downloadBtn.classList.toggle('loading', isLoading);
                if (isLoading) clearBtn.classList.remove('visible');
            }

            function showError(message) {
                errorText.textContent       = message;
                errorIndicator.style.display = 'flex';
                progressSection.style.display = 'none';
            }

            function hideError() {
                errorIndicator.style.display = 'none';
                errorText.textContent = '';
            }

            // ─── Progress polling ────────────────────────────────────────────
            const pollProgress = (sessionId) => {
                let consecutiveErrors = 0;
                const MAX_ERRORS = 5;

                pollInterval = setInterval(async () => {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/progress/${sessionId}`);

                        if (response.status === 404) {
                            // Session not found — server may have restarted; stop polling
                            clearInterval(pollInterval);
                            showError('Session expired or server was restarted. Please try again.');
                            setLoading(false);
                            return;
                        }

                        if (!response.ok) {
                            const errData = await response.json().catch(() => ({ message: 'Unknown server error.' }));
                            clearInterval(pollInterval);
                            showError(errData.message || 'Server returned an error.');
                            setLoading(false);
                            return;
                        }

                        consecutiveErrors = 0;
                        const data = await response.json();

                        // Update progress bar (clamp to 0-100 for display)
                        const pct = Math.max(0, Math.min(100, data.progress));
                        progressBar.style.width = `${pct}%`;
                        statusText.textContent  = `${data.progress >= 0 ? pct + '% — ' : ''}${data.message}`;

                        if (data.status === 'completed') {
                            clearInterval(pollInterval);
                            statusText.textContent = '✓ Success — downloading your PDF...';
                            statusText.classList.add('success');
                            progressBar.style.width = '100%';
                            await triggerDownload(sessionId);
                            setTimeout(resetUI, 6000);

                        } else if (data.status === 'error') {
                            clearInterval(pollInterval);
                            showError(data.message || 'An unknown error occurred during processing.');
                            setLoading(false);
                        }

                    } catch (networkError) {
                        consecutiveErrors++;
                        console.warn(`Poll error #${consecutiveErrors}:`, networkError.message);
                        if (consecutiveErrors >= MAX_ERRORS) {
                            clearInterval(pollInterval);
                            showError('Lost connection to the server. Please check that the server is running and try again.');
                            setLoading(false);
                        }
                    }
                }, 2000);
            };

            // ─── Download trigger ────────────────────────────────────────────
            const triggerDownload = async (sessionId) => {
                try {
                    const dlResponse = await fetch(`${API_BASE_URL}/api/download/${sessionId}`);
                    if (!dlResponse.ok) {
                        const errData = await dlResponse.json().catch(() => ({ error: 'Download failed.' }));
                        throw new Error(errData.error || 'Failed to fetch PDF.');
                    }
                    const blob = await dlResponse.blob();
                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href     = downloadUrl;
                    a.download = 'studocu-document.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                    statusText.textContent = '✓ Download complete';
                } catch (dlError) {
                    showError('PDF was generated but the download failed: ' + dlError.message);
                }
            };

            // ─── Download button click ───────────────────────────────────────
            downloadBtn.addEventListener('click', async () => {
                const url = urlInput.value.trim();

                if (!url) {
                    showError('Please paste a StuDocu document URL.');
                    return;
                }

                if (!/^https:\/\/www\.studocu\.com\/.+$/.test(url)) {
                    showError('Please provide a valid StuDocu URL starting with https://www.studocu.com/');
                    return;
                }

                // Stop any existing poll
                if (pollInterval) clearInterval(pollInterval);

                resetUI();
                setLoading(true);
                progressSection.style.display = 'block';
                statusText.textContent = 'Connecting to server...';

                try {
                    const response = await fetch(`${API_BASE_URL}/api/request-download`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url }),
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({ error: 'Failed to start the download process.' }));
                        throw new Error(errorData.error || 'Server error. Please try again.');
                    }

                    const { sessionId } = await response.json();
                    statusText.textContent = 'Starting browser...';
                    pollProgress(sessionId);

                } catch (error) {
                    showError(error.message);
                    setLoading(false);
                }
            });

            // ─── Enter key shortcut ──────────────────────────────────────────
            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !downloadBtn.disabled) downloadBtn.click();
            });
        });
    </script>
</body>

</html>
